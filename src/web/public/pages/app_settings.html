<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - BluePrint</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/navbar.js" defer></script>
</head>
<body>
    <div id="navbar"></div>
    <main class="page-shell management-shell">
        <section class="page-header">
            <div>
                <h1>App Settings</h1>
                <p class="page-subtitle">Manage the student directory and core attendance app records from one operations workspace.</p>
            </div>
        </section>

        <section class="management-grid">
            <section class="glass-panel management-card">
                <div class="panel-title">
                    <h2>Add Student</h2>
                </div>
                <p class="management-copy">Create a student account with an ID, name, and password for scanner enrollment workflows.</p>
                <form id="addStudentForm" class="management-form">
                    <div class="form-group">
                        <label>Student ID</label>
                        <input type="text" id="student_id" required>
                    </div>
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="first_name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="last_name" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <div class="button-row">
                        <button type="submit" class="primary-btn"><i class="fas fa-user-plus"></i> Create Student</button>
                    </div>
                    <p id="studentMessage" class="management-message"></p>
                </form>
            </section>

            <section class="glass-panel management-card">
                <div class="panel-title">
                    <h2>Students</h2>
                    <span class="pill">Directory view</span>
                </div>
                <div id="studentsListContainer" class="loading-state-panel">Loading students...</div>
            </section>
        </section>
    </main>

    <div id="editStudentModal" class="modal surface-modal">
        <div class="modal-content">
            <span class="close-btn" id="closeEditStudentModal">&times;</span>
            <div class="panel-title">
                <h2>Edit Student</h2>
            </div>
            <form id="editStudentForm" class="management-form">
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" id="edit_student_id" required>
                </div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="edit_first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="edit_last_name" required>
                </div>
                <div class="button-row">
                    <button type="button" class="soft-button" id="change_uuid"><i class="fas fa-key"></i> Reset UUID</button>
                </div>
                <div class="form-group">
                    <label>New Password (leave blank to keep current)</label>
                    <input type="password" id="edit_password">
                </div>
                <div class="button-row">
                    <button type="submit" class="primary-btn"><i class="fas fa-save"></i> Update Student</button>
                </div>
                <p id="editStudentMessage" class="management-message"></p>
            </form>
        </div>
    </div>
    <script>
        let currentEditingStudentId = null;
        const token = localStorage.getItem('auth_token');
        document.addEventListener('DOMContentLoaded', loadStudents);
        document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const student_id = document.getElementById('student_id').value;
            const first_name = document.getElementById('first_name').value;
            const last_name = document.getElementById('last_name').value;
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('studentMessage');
            messageEl.textContent = "Creating student...";
            try {
                const response = await fetch('/api/students', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ student_id, first_name, last_name, password })
                });
                const data = await response.json();
                if (!response.ok) {
                    messageEl.textContent = data.error || "Error creating student";
                    return;
                }
                messageEl.textContent = "Student created successfully!";
                document.getElementById('addStudentForm').reset();
                setTimeout(() => {
                    loadStudents();
                    messageEl.textContent = "";
                }, 1000);
            } catch (err) {
                console.error(err);
                messageEl.textContent = "Server error";
            }
        });
        const editStudentModal = document.getElementById('editStudentModal');
        const closeEditStudentModal = document.getElementById('closeEditStudentModal');
        const editStudentForm = document.getElementById('editStudentForm');
        const editStudentMessage = document.getElementById('editStudentMessage');
        const changeUuidBtn = document.getElementById('change_uuid');
        closeEditStudentModal.addEventListener('click', () => {
            editStudentModal.style.display = "none";
        });
        window.addEventListener('click', (e) => {
            if (e.target === editStudentModal) {
                editStudentModal.style.display = "none";
            }
        });
        changeUuidBtn.addEventListener('click', async () => {
            if (!currentEditingStudentId) return;
            if (!confirm("Are you sure you want to reset this student's UUID? This cannot be undone.")) {
                return;
            }
            try {
                const response = await fetch(`/api/app/students/${currentEditingStudentId}/reset_uuid`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();
                if (!response.ok) {
                    editStudentMessage.textContent = data.error || "Error resetting UUID";
                    return;
                }
                editStudentMessage.textContent = "UUID reset successfully!";
                setTimeout(() => {
                    loadStudents();
                    editStudentMessage.textContent = "";
                }, 1000);
            } catch (err) {
                console.error(err);
                editStudentMessage.textContent = "Server error";
            }
        });
        editStudentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const student_id = document.getElementById('edit_student_id').value;
            const first_name = document.getElementById('edit_first_name').value;
            const last_name = document.getElementById('edit_last_name').value;
            const password = document.getElementById('edit_password').value;
            editStudentMessage.textContent = "Updating student...";
            try {
                const body = { student_id, first_name, last_name };
                if (password) body.password = password;
                const response = await fetch(`/api/students/${currentEditingStudentId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                if (!response.ok) {
                    editStudentMessage.textContent = data.error || "Error updating student";
                    return;
                }
                editStudentMessage.textContent = "Student updated successfully!";
                setTimeout(() => {
                    editStudentModal.style.display = "none";
                    loadStudents();
                }, 1000);
            } catch (err) {
                console.error(err);
                editStudentMessage.textContent = "Server error";
            }
        });

        async function loadStudents() {
            const container = document.getElementById('studentsListContainer');
            try {
                const response = await fetch('/api/students', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) {
                    throw new Error('Failed to load students');
                }
                const students = await response.json();
                if (students.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>No Students</h3>
                            <p>Add a student using the form on the left.</p>
                        </div>
                    `;
                    return;
                }
                let tableHTML = `
                    <div class="management-table-shell">
                        <table class="management-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                students.forEach(student => {
                    const created = new Date(student.created_at).toLocaleDateString();
                    tableHTML += `
                        <tr>
                            <td>${student.student_id}</td>
                            <td>${student.first_name} ${student.last_name}</td>
                            <td>${created}</td>
                            <td>
                                <div class="management-action-row">
                                    <button class="soft-button" onclick="editStudent(${student.id}, '${student.student_id}', '${student.first_name}', '${student.last_name}')">Edit</button>
                                    <button class="danger-button" onclick="deleteStudent(${student.id}, '${student.student_id}')">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                tableHTML += `</tbody></table></div>`;
                container.innerHTML = tableHTML;
            } catch (err) {
                console.error('Error loading students:', err);
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Error Loading Students</h3>
                    </div>
                `;
            }
        }

        function editStudent(id, studentId, firstName, lastName) {
            currentEditingStudentId = id;
            document.getElementById('edit_student_id').value = studentId;
            document.getElementById('edit_first_name').value = firstName;
            document.getElementById('edit_last_name').value = lastName;
            document.getElementById('edit_password').value = '';
            editStudentMessage.textContent = '';
            editStudentModal.style.display = "flex";
        }

        async function deleteStudent(id, studentId) {
            if (!confirm(`Are you sure you want to delete student "${studentId}"?`)) {
                return;
            }
            try {
                const response = await fetch(`/api/students/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) {
                    alert('Failed to delete student');
                    return;
                }
                loadStudents();
            } catch (err) {
                console.error('Error deleting student:', err);
                alert('Error deleting student');
            }
        }
    </script>
</body>
</html>
