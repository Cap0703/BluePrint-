<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Master Logs - BluePrint™</title>
        <link rel="stylesheet" href="/css/style.css">
        <script defer src="/js/navbar.js"></script>
        <script defer src="/js/logs.js"></script>
        <link rel="icon" type="image/png" href="/images/favicon.png">
    </head>
    <body>
        <div id="navbar"></div>
        <main class="page-shell">
            <section class="page-header">
                <div>
                    <h1>Master Logs</h1>
                    <p class="page-subtitle">Review every scan, add entries manually, and clean up unassigned periods or statuses from a single operations view.</p>
                </div>
                <div class="quick-actions">
                    <button id="assignPeriodsBtn" class="secondary-btn">Assign Periods</button>
                    <button id="assignStatusesBtn" class="secondary-btn">Assign Statuses</button>
                    <button id="addLogButton" class="primary-btn">Add Log Entry</button>
                </div>
            </section>
            <section class="metrics-grid" id="logMetrics"></section>
            <section class="master-logs-card panel-section">
                <div class="panel-title">
                    <h2>Live Log Stream</h2>
                    <div class="toolbar">
                        <input type="search" id="logSearch" placeholder="Search student, ID, room, or scanner">
                        <select id="logStatusFilter">
                            <option value="">All statuses</option>
                            <option value="On Time">On Time</option>
                            <option value="Late">Late</option>
                            <option value="Absent">Absent</option>
                            <option value="Excused">Excused</option>
                            <option value="Unknown">Unknown</option>
                        </select>
                        <select id="logPeriodFilter">
                            <option value="">All periods</option>
                        </select>
                        <input type="file" id="csvUploadInput" accept=".csv,text/csv" hidden>
                        <button id="csvUploadBtn" class="secondary-btn">CSV Upload</button>
                        <button id="csv" class="secondary-btn">CSV Download</button>
                    </div>
                </div>
                <div id="logsContent"></div>
            </section>
            <div id="logModal" class="modal">
                <div class="modal-content">
                    <span class="close-btn" id="closeModal">&times;</span>
                    <h2>Add Log Entry</h2>
                    <form id="logForm">
                        <input type="text" name="first_name" placeholder="First Name (optional, auto-fill if student exists)">
                        <input type="text" name="last_name" placeholder="Last Name (optional, auto-fill if student exists)">
                        <input type="text" name="student_id" placeholder="Student ID" required>
                        <input type="text" name="period" placeholder="Period (leave blank for auto assign)">
                        <input type="text" name="scanner_location" placeholder="Scanner Location" required>
                        <input type="text" name="scanner_id" placeholder="Scanner ID" required>
                        <select type="text" name="status">
                            <option value="">Auto Assign</option>
                            <option value="on-time">On Time</option>
                            <option value="late">Late</option>
                            <option value="absent">Absent</option>
                            <option value="excused">Excused</option>
                        </select>
                        <input type="text" name="time_scanned" placeholder="Time Scanned (HH:MM:SS)">
                        <input type="text" name=date_scanned placeholder="Date Scanned (YYYY-MM-DD)">
                        <button type="submit">Submit Log</button>
                    </form>
                </div>
            </div>
        </main>
    </body>
</html>
