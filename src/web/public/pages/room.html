<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Room - BluePrint™</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="/css/style.css">
        <script src="/js/navbar.js" defer></script>
        <script src="/js/room.js" defer></script>
    </head>
    <body>
        <div id="navbar"></div>
        <main class="page-shell">
            <section class="page-header">
                <div>
                    <h1 id="room-info">Room Overview</h1>
                    <p class="page-subtitle" id="room-subtitle">Loading room activity...</p>
                </div>
            </section>
            <section class="room-layout">
                <div class="stack">
                    <div class="room-card panel-section">
                        <div class="panel-title">
                            <h3>Room Snapshot</h3>
                        </div>
                        <div class="detail-grid" id="roomDetails"></div>
                    </div>
                    <div class="room-card panel-section">
                        <div class="panel-title">
                            <h3>Current Day Activity</h3>
                        </div>
                        <div class="activity-feed" id="roomActivityFeed"></div>
                    </div>
                </div>
                <div class="stack">
                    <div class="metrics-grid" id="roomMetrics"></div>
                    <div class="room-card panel-section">
                        <div class="panel-title">
                            <h3>Scan History</h3>
                            <div class="toolbar">
                                <select id="roomPeriodFilter">
                                    <option value="">All periods</option>
                                </select>
                                <input type="date" id="roomDateFilter">
                            </div>
                        </div>
                        <div id="roomLogs"></div>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
