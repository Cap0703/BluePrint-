<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Profile - BluePrint™</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="/css/style.css">
        <script src="/js/navbar.js" defer></script>
        <script src="/js/profile.js" defer></script>
    </head>
    <body>
        <div id="navbar"></div>
        <main class="page-shell">
            <section class="page-header">
                <div>
                    <h1>User Profile</h1>
                    <p class="page-subtitle">Your BluePrint identity, assigned courses, and recent attendance activity all in one place.</p>
                </div>
            </section>
            <section class="profile-layout">
                <div class="profile-card panel-section">
                    <div class="profile-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h2 id="profileName">Loading...</h2>
                    <div class="label-value">
                        <span>Email</span>
                        <span id="profileEmail">Loading...</span>
                    </div>
                    <div class="label-value">
                        <span>Role</span>
                        <span id="profileRole">Loading...</span>
                    </div>
                    <div class="label-value">
                        <span>Member Since</span>
                        <span id="profileCreatedAt">Loading...</span>
                    </div>
                </div>
                <div class="stack">
                    <div class="metrics-grid" id="profileMetrics"></div>
                    <div class="profile-card panel-section">
                        <div class="panel-title">
                            <h3>Assigned Courses</h3>
                        </div>
                        <div class="split-list" id="profileCourses"></div>
                    </div>
<!--                    <div class="profile-card panel-section">
                        <div class="panel-title">
                            <h3>Recent Attendance Activity</h3>
                        </div>
                        <div class="activity-feed" id="profileActivity"></div>
                    </div>-->
                </div>
            </section>
        </main>
    </body>
</html>
