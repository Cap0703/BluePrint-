<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Current Class Map - BluePrint™</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="/css/style.css">
        <script src="/js/navbar.js" defer></script>
        <script src="/js/map.js" defer></script>
    </head>
    <body>
        <div id="navbar"></div>
        <main class="page-shell">
            <section class="page-header">
                <div>
                    <h1>Current Class Map</h1>
                    <p class="page-subtitle">Manage the campus layout, place rooms and scanners, and review which rooms are seeing activity today.</p>
                </div>
            </section>
            <section class="metrics-grid" id="mapMetrics"></section>
            <section class="map-layout">
                <aside class="map-sidebar glass-panel">
                    <div class="panel-title">
                        <h2>Map Tools</h2>
                    </div>
                    <div class="toolbar" style="display:grid;">
                        <input type="text" id="roomName" placeholder="Room name">
                        <button id="addRoomButton" class="primary-btn">Add Room</button>
                        <button id="saveMapButton" class="secondary-btn">Save Map</button>
                        <button id="deleteModeBtn" class="danger-btn">Delete Mode</button>
                    </div>
                    <div class="label-value">
                        <span>Current Layer</span>
                        <span id="currentMapLayer" data-z="0">0</span>
                    </div>
                    <div class="quick-actions">
                        <button id="upLayerButton" class="secondary-btn"><i class="fas fa-arrow-up"></i> Up</button>
                        <button id="downLayerButton" class="secondary-btn"><i class="fas fa-arrow-down"></i> Down</button>
                    </div>
                    <div class="panel-title" style="margin-top: 1.5rem;">
                        <h3>Rooms</h3>
                    </div>
                    <div class="map-room-list" id="mapRoomList"></div>
                    <div class="panel-title" style="margin-top: 1.5rem;">
                        <h3>Selected Room</h3>
                    </div>
                    <div class="activity-feed" id="selectedRoomDetails">
                        <div class="empty-state" style="padding: 1rem;">Select a room to inspect its activity.</div>
                    </div>
                </aside>
                <div class="map-card">
                    <div id="mapCanvas"></div>
                </div>
            </section>
        </main>
    </body>
</html>
