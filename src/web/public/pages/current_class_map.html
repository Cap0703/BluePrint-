<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Current Class Map - BluePrint™</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="/css/style.css">
        <script src="/js/navbar.js"></script>
        <script src="/js/map.js"></script>
    </head>
    <style>
.map-builder{
    margin-top:40px;
}

.map-toolbar{
    margin-bottom:10px;
}

#mapCanvas{
    width:1000%;
    height:900px;
    background:#f3f3f3;
    border:2px solid #ccc;
    position:relative;
    overflow:hidden;
}

.room{
    position:absolute;
    border:2px solid #1f4ed8;
    background:rgba(31,78,216,0.1);
    color: black;
    border-radius:6px;
    padding:5px;
    cursor:move;
}

.room-header{
    font-weight:bold;
    font-size:12px;
}

.scanner-dot{
    width:20px;
    height:20px;
    background:#e74c3c;
    border-radius:50%;
    position:absolute;
    cursor:grab;
}

.scanner-dot:hover{
    transform:scale(1.2);
}
    </style>
    <body>
        <div id="navbar"></div>
        <div class="map-container">
            <h1>Current Class Map</h1>
            <div class="map-card">
                <div id="map-canvas"></div>
                <div class="map-builder">
    <h2>Class Map Builder</h2>

    <div class="map-toolbar">
        <div class="input-group">
            <label for="roomName">Room Name:</label>
            <input type="text" id="roomName" placeholder="Enter room name">
        </div>
        <button onclick="createRoom(document.getElementById('roomName').value)" class="btn-primary">
            <i class="fas fa-door-open"></i> Add Room
        </button>

        <button onclick="saveMap()" class="btn-primary">
            <i class="fas fa-save"></i> Save Map
        </button>
    </div>
    <div id="mapCanvas">
        <button onlick="upLayer()" class="btn-secondary">
            <i class="fas fa-layer-group"></i> Move Layer Up
        </button>
        <button onlick="downLayer()" class="btn-secondary">
            <i class="fas fa-layer-group"></i> Move Layer Down
        </button>
    </div>
</div>
            </div>
        </div>
    </body>
</html>
