<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BluePrint</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/navbar.js" defer></script>
</head>
<body>
    <div id="navbar"></div>
    <main class="page-shell management-shell">
        <section class="page-header">
            <div>
                <h1>Admin Center</h1>
                <p class="page-subtitle">Manage users, course assignments, and attendance system settings from a unified operations page.</p>
            </div>
        </section>

        <section class="management-grid">
            <section class="glass-panel management-card">
                <div class="panel-title"><h2>Add User</h2></div>
                <form id="addUserForm" class="management-form">
                    <div class="form-group"><label>Email</label><input type="email" id="user_email" required></div>
                    <div class="form-group"><label>First Name</label><input type="text" id="user_first_name" required></div>
                    <div class="form-group"><label>Last Name</label><input type="text" id="user_last_name" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="user_password" required></div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="user_role" required>
                            <option value="">Select a role...</option>
                            <option value="teacher">Teacher</option>
                            <option value="administrator">Administrator</option>
                        </select>
                    </div>
                    <div class="form-group" id="coursesGroup" style="display:none;">
                        <label>Assign Courses</label>
                        <div id="coursesList" class="management-checklist"><p class="muted">Loading courses...</p></div>
                    </div>
                    <div class="button-row"><button type="submit" class="primary-btn"><i class="fas fa-user-plus"></i> Create User</button></div>
                    <p id="userMessage" class="management-message"></p>
                </form>
            </section>

            <section class="glass-panel management-card">
                <div class="panel-title"><h2>Users</h2><span class="pill">Accounts</span></div>
                <div id="usersListContainer" class="loading-state-panel">Loading users...</div>
            </section>
        </section>

        <section class="management-grid">
            <section class="glass-panel management-card">
                <div class="panel-title"><h2>Add Course</h2></div>
                <form id="addCourseForm" class="management-form">
                    <div class="form-group"><label>Room Number</label><input type="text" id="course_room" placeholder="e.g., 101, A202" required></div>
                    <div class="form-group">
                        <label>Period</label>
                        <select id="course_period" required>
                            <option value="">Select a period...</option>
                            <option value="Period 1">Period 1</option>
                            <option value="Period 2">Period 2</option>
                            <option value="Period 3">Period 3</option>
                            <option value="Period 4">Period 4</option>
                            <option value="Period 5">Period 5</option>
                            <option value="Period 6">Period 6</option>
                            <option value="Period 7">Period 7</option>
                            <option value="Academic Support">Academic Support</option>
                            <option value="School Wide Mass">School Wide Mass</option>
                            <option value="Faith Family">Faith Family</option>
                            <option value="Club">Club</option>
                        </select>
                    </div>
                    <div class="button-row"><button type="submit" class="primary-btn"><i class="fas fa-plus"></i> Add Course</button></div>
                    <p id="courseMessage" class="management-message"></p>
                </form>
            </section>

            <section class="glass-panel management-card">
                <div class="panel-title"><h2>Courses</h2><span class="pill">Assignments</span></div>
                <div id="coursesListContainer" class="loading-state-panel">Loading courses...</div>
            </section>
        </section>

        <section class="management-grid">
            <section class="glass-panel management-card">
                <div class="panel-title"><h2>System Settings</h2></div>
                <form class="management-form" onsubmit="return false;">
                    <div class="form-group">
                        <label for="gracePeriod">Attendance Grace Period (minutes)</label>
                        <input type="number" id="gracePeriod" min="0" value="10">
                    </div>
                    <div class="button-row"><button id="updateSettingsBtn" class="primary-btn">Update Settings</button></div>
                    <p id="settingsMessage" class="management-message"></p>
                </form>
            </section>
        </section>
    </main>

    <div id="editUserModal" class="modal surface-modal">
        <div class="modal-content">
            <span class="close-btn" id="closeEditUserModal">&times;</span>
            <div class="panel-title"><h2>Edit User</h2></div>
            <form id="editUserForm" class="management-form">
                <div class="form-group"><label>Email</label><input type="email" id="edit_user_email" required></div>
                <div class="form-group"><label>First Name</label><input type="text" id="edit_user_first_name" required></div>
                <div class="form-group"><label>Last Name</label><input type="text" id="edit_user_last_name" required></div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="edit_user_role" required>
                        <option value="">Select a role...</option>
                        <option value="teacher">Teacher</option>
                        <option value="administrator">Administrator</option>
                    </select>
                </div>
                <div class="form-group"><label>New Password (leave blank to keep current)</label><input type="password" id="edit_user_password"></div>
                <div class="form-group" id="editCoursesGroup" style="display:none;">
                    <label>Assign Courses</label>
                    <div id="editCoursesList" class="management-checklist"><p class="muted">Loading courses...</p></div>
                </div>
                <div class="button-row"><button type="submit" class="primary-btn"><i class="fas fa-save"></i> Update User</button></div>
                <p id="editUserMessage" class="management-message"></p>
            </form>
        </div>
    </div>
    <script>
        let currentEditingUserId = null;
        let allCourses = [];
        const token = localStorage.getItem('auth_token');
        document.addEventListener('DOMContentLoaded', async () => {
            await loadCourses();
            await loadUsers();
            await loadSettings();
            setupCourseForm();
            setupRoleToggle();
        });
        
        function setupRoleToggle() {
            document.getElementById('user_role').addEventListener('change', (e) => {
                const coursesGroup = document.getElementById('coursesGroup');
                if (e.target.value === 'teacher') {
                    coursesGroup.style.display = 'block';
                    populateCoursesCheckboxes('coursesList');
                } else {
                    coursesGroup.style.display = 'none';
                }
            });
        }
        
        function populateCoursesCheckboxes(containerId) {
            const container = document.getElementById(containerId);
            if (allCourses.length === 0) {
                container.innerHTML = '<p class="muted">No courses available</p>';
                return;
            }
            container.innerHTML = allCourses.map(course => `
                <label class="management-checklist-item">
                    <input type="checkbox" value="${course.id}" class="course-checkbox">
                    <span>Room ${course.room} - ${course.period}</span>
                </label>
            `).join('');
        }
        
        function setupCourseForm() {
            const form = document.getElementById('addCourseForm');
            if (!form) return;
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const room = document.getElementById('course_room').value;
                const period = document.getElementById('course_period').value;
                const messageEl = document.getElementById('courseMessage');
                messageEl.textContent = 'Adding course...';
                try {
                    const response = await fetch('/api/courses', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ room, period })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        messageEl.textContent = data.error || 'Error adding course';
                        return;
                    }
                    messageEl.textContent = 'Course added successfully!';
                    document.getElementById('addCourseForm').reset();
                    setTimeout(() => {
                        loadCourses();
                        messageEl.textContent = '';
                    }, 1000);
                } catch (err) {
                    console.error(err);
                    messageEl.textContent = 'Server error';
                }
            });
        }
        
        async function loadCourses() {
            const container = document.getElementById('coursesListContainer');
            try {
                const response = await fetch('/api/courses', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) {
                    throw new Error('Failed to load courses');
                }
                allCourses = await response.json();
                if (allCourses.length === 0) {
                    container.innerHTML = `<div class="empty-state"><h3>No Courses</h3><p>Add a course using the form on the left.</p></div>`;
                    return;
                }
                let tableHTML = `
                    <div class="management-table-shell">
                    <table class="management-table">
                        <thead>
                            <tr>
                                <th>Room</th>
                                <th>Period</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                allCourses.forEach(course => {
                    tableHTML += `
                        <tr>
                            <td>${course.room}</td>
                            <td>${course.period}</td>
                            <td><div class="management-action-row"><button class="danger-button" onclick="deleteCourse(${course.id})">Delete</button></div></td>
                        </tr>
                    `;
                });
                tableHTML += `</tbody></table></div>`;
                container.innerHTML = tableHTML;
            } catch (err) {
                console.error('Error loading courses:', err);
                container.innerHTML = `<div class="empty-state"><h3>Error Loading Courses</h3></div>`;
            }
        }
        
        async function deleteCourse(id) {
            if (!confirm('Are you sure you want to delete this course?')) {
                return;
            }
            try {
                const response = await fetch(`/api/courses/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) {
                    alert('Failed to delete course');
                    return;
                }
                loadCourses();
            } catch (err) {
                console.error('Error deleting course:', err);
                alert('Error deleting course');
            }
        }
        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('user_email').value;
            const first_name = document.getElementById('user_first_name').value;
            const last_name = document.getElementById('user_last_name').value;
            const password = document.getElementById('user_password').value;
            const role = document.getElementById('user_role').value;
            const messageEl = document.getElementById('userMessage');
            messageEl.textContent = "Creating user...";
            let courses = [];
            if (role === 'teacher') {
                const checkboxes = document.querySelectorAll('.course-checkbox:checked');
                courses = Array.from(checkboxes).map(cb => parseInt(cb.value));
            }
            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ email, first_name, last_name, password, role, courses })
                });
                const data = await response.json();
                if (!response.ok) {
                    messageEl.textContent = data.error || "Error creating user";
                    return;
                }
                messageEl.textContent = "User created successfully!";
                document.getElementById('addUserForm').reset();
                setTimeout(() => {
                    loadUsers();
                    messageEl.textContent = "";
                }, 1000);
            } catch (err) {
                console.error(err);
                messageEl.textContent = "Server error";
            }
        });
        const editUserModal = document.getElementById('editUserModal');
        const closeEditUserModal = document.getElementById('closeEditUserModal');
        const editUserForm = document.getElementById('editUserForm');
        const editUserMessage = document.getElementById('editUserMessage');
        closeEditUserModal.addEventListener('click', () => {
            editUserModal.style.display = "none";
        });
        window.addEventListener('click', (e) => {
            if (e.target === editUserModal) {
                editUserModal.style.display = "none";
            }
        });
        document.getElementById('edit_user_role').addEventListener('change', (e) => {
            const editCoursesGroup = document.getElementById('editCoursesGroup');
            if (e.target.value === 'teacher') {
                editCoursesGroup.style.display = 'block';
                populateCoursesCheckboxes('editCoursesList');
            } else {
                editCoursesGroup.style.display = 'none';
            }
        });
        editUserForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('edit_user_email').value;
            const first_name = document.getElementById('edit_user_first_name').value;
            const last_name = document.getElementById('edit_user_last_name').value;
            const role = document.getElementById('edit_user_role').value;
            const password = document.getElementById('edit_user_password').value;
            editUserMessage.textContent = "Updating user...";
            let courses = [];
            if (role === 'teacher') {
                const checkboxes = document.querySelectorAll('#editCoursesList .course-checkbox:checked');
                courses = Array.from(checkboxes).map(cb => parseInt(cb.value));
            }
            try {
                const body = { email, first_name, last_name, role, courses };
                if (password) body.password = password;
                const response = await fetch(`/api/users/${currentEditingUserId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                if (!response.ok) {
                    editUserMessage.textContent = data.error || "Error updating user";
                    return;
                }
                editUserMessage.textContent = "User updated successfully!";
                setTimeout(() => {
                    editUserModal.style.display = "none";
                    loadUsers();
                }, 1000);
            } catch (err) {
                console.error(err);
                editUserMessage.textContent = "Server error";
            }
        });

        async function loadUsers() {
            const container = document.getElementById('usersListContainer');
            try {
                const response = await fetch('/api/users', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) {
                    throw new Error('Failed to load users');
                }
                const users = await response.json();
                if (users.length === 0) {
                    container.innerHTML = `<div class="empty-state"><h3>No Users</h3><p>Add a user using the form on the left.</p></div>`;
                    return;
                }
                let tableHTML = `
                    <div class="management-table-shell">
                    <table class="management-table">
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Name</th>
                                <th>Role</th>
                                <th>Courses</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                users.forEach(user => {
                    const created = new Date(user.created_at).toLocaleDateString();
                    const courses = user.courses || [];
                    let coursesStr = '';
                    if (courses.length && allCourses.length) {
                        const matched = allCourses.filter(c => courses.includes(c.id));
                        coursesStr = matched.map(c => `Room ${c.room} - ${c.period}`).join(', ');
                    }
                    if (!coursesStr && courses.length) {
                        coursesStr = courses.join(', ');
                    }
                    const coursesJson = JSON.stringify(courses);
                    tableHTML += `
                        <tr>
                            <td>${user.email}</td>
                            <td>${user.first_name} ${user.last_name}</td>
                            <td><span class="status-pill ${user.role === 'administrator' ? 'late' : 'excused'}">${user.role}</span></td>
                            <td>${coursesStr}</td>
                            <td>${created}</td>
                            <td>
                                <div class="management-action-row">
                                    <button class="soft-button" onclick="editUser(${user.id}, '${user.email}', '${user.first_name}', '${user.last_name}', '${user.role}', ${coursesJson})">Edit</button>
                                    <button class="danger-button" onclick="deleteUser(${user.id}, '${user.email}')">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                tableHTML += `</tbody></table></div>`;
                container.innerHTML = tableHTML;
            } catch (err) {
                console.error('Error loading users:', err);
                container.innerHTML = `<div class="empty-state"><h3>Error Loading Users</h3></div>`;
            }
        }

        function editUser(id, email, firstName, lastName, role, courses = []) {
            currentEditingUserId = id;
            document.getElementById('edit_user_email').value = email;
            document.getElementById('edit_user_first_name').value = firstName;
            document.getElementById('edit_user_last_name').value = lastName;
            document.getElementById('edit_user_role').value = role;
            document.getElementById('edit_user_password').value = '';
            editUserMessage.textContent = '';
            const editCoursesGroup = document.getElementById('editCoursesGroup');
            if (role === 'teacher') {
                editCoursesGroup.style.display = 'block';
                populateCoursesCheckboxes('editCoursesList');
                setTimeout(() => {
                    const checkboxes = document.querySelectorAll('#editCoursesList .course-checkbox');
                    checkboxes.forEach(cb => {
                        cb.checked = courses.includes(parseInt(cb.value));
                    });
                }, 0);
            } else {
                editCoursesGroup.style.display = 'none';
            }
            editUserModal.style.display = "flex";
        }

        async function deleteUser(id, email) {
            if (!confirm(`Are you sure you want to delete user "${email}"?`)) {
                return;
            }
            try {
                const response = await fetch(`/api/users/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) {
                    alert('Failed to delete user');
                    return;
                }
                loadUsers();
            } catch (err) {
                console.error('Error deleting user:', err);
                alert('Error deleting user');
            }
        }

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings/grace-period', {
                    headers: {
                        Authorization: `Bearer ${token}`
                    }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('gracePeriod').value = data.value;
                }
            } catch (err) {
                console.error('Failed to load settings');
            }
        }

        document.getElementById('updateSettingsBtn').addEventListener('click', async () => {
            const value = document.getElementById('gracePeriod').value;
            const messageEl = document.getElementById('settingsMessage');
            try {
                const res = await fetch('/api/settings/grace-period', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${token}`
                    },
                    body: JSON.stringify({ value })
                });
                if (res.ok) {
                    messageEl.textContent = 'Settings updated successfully';
                } else {
                    const error = await res.json();
                    messageEl.textContent = error.error || 'Failed to update';
                }
            } catch (err) {
                messageEl.textContent = 'Server error';
            }
        });
    </script>
</body>
</html>
