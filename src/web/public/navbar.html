<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Left Side Navigation Bar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <style>
        .navbar {
            width: 200px;
            background: linear-gradient(135deg, #4272a2, #1a2530);
            color: white;
            height: 100vh;
            position: fixed;
            left: -190px;
            top: 0;
            overflow-y: auto;
            transition: all 0.3s ease;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            border-radius: 0 10px 10px 0;
        }

        .navbar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .navbar.pinned {
            left: 0px;
        }

        .navbar-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .navbar-menu {
            list-style: none;
            padding: 15px 0;
            margin: 0;
        }

        .navbar-item {
            padding: 0;
            margin: 5px 15px;
            border-radius: 8px;
            overflow: hidden;
        }

        .navbar-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #b0b7c3;
            text-decoration: none;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .navbar-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .navbar-link.active {
            background-color: #3498db;
            color: white;
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3);
        }

        .navbar-icon {
            margin-right: 12px;
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
        }

        .navbar-text {
            font-size: 0.95rem;
            margin-left: 5%;
        }

        .navbar-icon img {
            width: 30px;
            height: 30px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .navbar.pinned {
            left: 0px;
        }

        .navbar.pinned,
        .navbar.locked {
            left: 0px !important;
        }

        .navbar:not(.pinned):not(.locked):hover {
            left: 0px;
        }

        .nav-toggle {
            position: absolute;
            right: 10px;
            top: 30%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .nav-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .navbar.pinned .nav-toggle i {
            transform: rotate(45deg);
        }

        .navbar-menu .navbar-item:last-child {
            display: none;
        }

        @media (max-width: 900px) {
            .navbar {
                width: 0;
                height: 0;
                max-height: none;
                left: 0.5rem !important;
                top: 0.5rem;
                overflow: visible;
                border-radius: 0;
                transform: none;
                transition: box-shadow 0.3s ease, background 0.3s ease;
                box-shadow: none;
                background: transparent;
                pointer-events: none;
            }

            .navbar.mobile-open {
                width: calc(100vw - 1rem);
                height: auto;
                max-height: calc(100vh - 0.5rem);
                background: linear-gradient(135deg, #4272a2, #1a2530);
                overflow-y: auto;
                box-shadow: 0 18px 32px rgba(0, 0, 0, 0.24);
                border-radius: 18px;
                pointer-events: auto;
            }

            .navbar-header {
                padding: 0;
                border-bottom: none;
                display: block;
            }

            .navbar-header h2,
            .navbar-header img {
                display: none;
            }

            .navbar:not(.mobile-open) .navbar-user-section,
            .navbar:not(.mobile-open) .navbar-menu {
                display: none !important;
            }

            .nav-toggle {
                position: fixed;
                top: 0.75rem;
                left: 0.75rem;
                right: auto;
                transform: none;
                margin-left: 0;
                width: 48px;
                height: 48px;
                border-radius: 12px;
                background: linear-gradient(135deg, #4272a2, #1a2530);
                box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
                z-index: 1101;
                pointer-events: auto;
            }

            .nav-toggle i,
            .navbar.pinned .nav-toggle i {
                transform: none;
            }

            .navbar-menu {
                display: none;
                padding: 4.25rem 0 1rem 0;
                min-width: calc(100vw - 1rem);
            }

            .navbar.mobile-open .navbar-menu {
                display: block;
            }

            .navbar.mobile-open .navbar-user-section {
                display: block !important;
                min-width: calc(100vw - 1rem);
                padding: 0.75rem 1rem 1rem 1rem !important;
            }

            .navbar-link {
                padding: 14px 16px;
            }

            .navbar-text {
                font-size: 1rem;
                margin-left: 0;
            }

            .navbar:not(.mobile-open):hover {
                left: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="navbar-header">
            <img src="css/logos/BluePrint_logo.png" alt="BluePrint Logo" style="width:40px; margin-top:0px;">
            <button class="nav-toggle" id="navToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h2 style="font-family: 'BluePrintFont'">BluePrint<span style="font-family:sans-serif">™</span></h2>
        </div>
        <ul class="navbar-menu">
            <li class="navbar-item">
                <a href="/" class="navbar-link" data-page="dashboard">
                    <span class="navbar-icon"><img src="navbar-icon/dashboard.png" alt="Dashboard Icon"></span>
                    <span class="navbar-text">Dashboard</span>
                </a>
            </li>
            <li class="navbar-item">
                <a href="/profile" class="navbar-link" data-page="profile">
                    <span class="navbar-icon"><img src="navbar-icon/profile.png" alt="Profile Icon"></span>
                    <span class="navbar-text">Profile</span>
                </a>
            </li>
            <li class="navbar-item">
                <a href="/analytics" class="navbar-link" data-page="analytics">
                    <span class="navbar-icon"><img src="navbar-icon/analytics.png" alt="Analytics Icon"></span>
                    <span class="navbar-text">Analytics</span>
                </a>
            </li>
            <li class="navbar-item">
                <a href="/master_logs" class="navbar-link" data-page="master_logs">
                    <span class="navbar-icon"><img src="navbar-icon/master_logs.png" alt="Master Logs Icon"></span>
                    <span class="navbar-text">Master Logs</span>
                </a>
            </li>
            <li class="navbar-item">
                <a href="/my_logs" class="navbar-link" data-page="my_logs">
                    <span class="navbar-icon"><img src="navbar-icon/master_logs.png" alt="My Logs Icon"></span>
                    <span class="navbar-text">My Logs</span>
                </a>
            </li>
            <li class="navbar-item">
                <a href="/calendar" class="navbar-link" data-page="calendar">
                    <span class="navbar-icon"><img src="navbar-icon/calendar.png" alt="Calendar Icon"></span>
                    <span class="navbar-text">Calendar</span>
                </a>
            </li>
            <li class="navbar-item">
                <a href="/map" class="navbar-link" data-page="map">
                    <span class="navbar-icon"><img src="navbar-icon/current_class_map.png" alt="Map Icon"></span>
                    <span class="navbar-text">Current Class Map</span>
                </a>
            </li>
            <li class="navbar-item">
                <a href="/lookup" class="navbar-link" data-page="lookup">
                    <span class="navbar-icon"><img src="navbar-icon/student_lookup.png" alt="Lookup Icon"></span>
                    <span class="navbar-text">Student Lookup</span>
                </a>
            </li>
            <li class="navbar-item">
                <a href="/scanners" class="navbar-link" data-page="scanners">
                    <span class="navbar-icon"><img src="navbar-icon/connected_scanners.png" alt="Scanners Icon"></span>
                    <span class="navbar-text">Connected Scanners</span>
                </a>
            </li>
            <li class="navbar-item">
                <a href="/app_settings" class="navbar-link" data-page="app_settings">
                    <span class="navbar-icon"><img src="navbar-icon/settings.png" alt="Settings Icon"></span>
                    <span class="navbar-text">App Settings</span>
                </a>
            </li>
            <li class="navbar-item">
                <a href="/admin" class="navbar-link" data-page="admin">
                    <span class="navbar-icon"><i class="fas fa-user-shield" style="color: white;"></i></span>
                    <span class="navbar-text">Admin</span>
                </a>
            </li>
            <li class="navbar-item">
                <a href="/security" class="navbar-link" data-page="security">
                    <span class="navbar-icon"><img src="navbar-icon/security.png" alt="Security Icon"></span>
                    <span class="navbar-text">Security</span>
                </a>
            </li>
        </ul>
    </nav>
</body>
<script src="/js/auth.js"></script>
</html>
